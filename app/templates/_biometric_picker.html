{# container_id: DOM id; name_prefix: e.g. encryptor_ or user2_ #}
<div class="bio-upload-section" id="{{ container_id }}" data-max-slots="3">
  <h3>{{ title }}</h3>
  <p class="bio-upload-hint">Select biometric type, then choose one file.</p>
  <div class="bio-slots"></div>
  <button type="button" class="btn-add-bio">+ Add biometric</button>
  <div class="bio-type-pills"></div>
  <template class="bio-slot-template">
    <div class="bio-slot">
      <select class="bio-type-select" aria-label="Biometric type">
        <option value="fingerprint">Fingerprint</option>
        <option value="iris">Iris / eye</option>
        <option value="face">Face</option>
      </select>
      <div class="bio-file-wrap">
        <input type="file" class="bio-file-input" accept="image/*">
      </div>
      <button type="button" class="btn-remove-bio" title="Remove">×</button>
    </div>
  </template>
</div>
